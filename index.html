<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
  </head>
  <body class="body">
    <section class="about">
      <img class="image" src="./eisenhower-matrix.jpg" alt="Eisenhower matrix">
      <a class="link" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </section>
    <section class="work-space">
      <h2 class="title">Add Item</h2>
      <div class="task">
        <input class="task__input" id="new-task" type="text">
        <button class="task__button">Add</button>
      </div>
      <h2 class="title">Todo</h2>
      <ul class="task-list" id="incomplete-tasks">
        <li class="task-list__item task">
          <input class="task__checkbox" type="checkbox">
          <label class="task__label">Pay Bills</label>
          <input class="task__input" type="text">
          <button class="task__button task__button_edit">Edit</button>
          <button class="task__button task__button_delete">
            <img class="task__icon" src="./remove.svg" alt="">
          </button>
        </li>
        <li class="task-list__item task task_edit-mode">
          <input class="task__checkbox" type="checkbox">
          <label class="task__label">Go Shopping</label>
          <input class="task__input" type="text" value="Go Shopping">
          <button class="task__button task__button_edit">Save</button>
          <button class="task__button task__button_delete">
            <img class="task__icon" src="./remove.svg" alt="">
          </button>
        </li>
      </ul>
      <h2 class="title">Completed</h2>
      <ul class="task-list" id="completed-tasks">
        <li class="task-list__item task">
          <input class="task__checkbox" type="checkbox" checked>
          <label class="task__label">See the Doctor</label>
          <input class="task__input" type="text">
          <button class="task__button task__button_edit">Edit</button>
          <button class="task__button task__button_delete">
            <img class="task__icon" src="./remove.svg" alt="">
          </button>
        </li>
      </ul>
    </section>
    <script src="app.js"></script>
  </body>
</html>
